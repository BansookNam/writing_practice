<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing Practice Generator</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5; color: #333; min-height: 100vh; display: flex;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px; min-width: 300px;
      background: #fff; border-right: 1px solid #ddd;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 20px;
      height: 100vh; overflow-y: auto;
      position: sticky; top: 0;
    }

    h1 { font-size: 18px; font-weight: 700; color: #111; }
    h1 .version { font-size: 11px; font-weight: 500; color: #999; margin-left: 6px; vertical-align: middle; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; color: #666;
    }

    select, textarea, input[type="text"], input[type="number"] {
      border: 1px solid #ddd; border-radius: 6px;
      padding: 8px 10px; font-size: 14px;
      background: #fafafa; color: #333;
      transition: border-color 0.15s; font-family: inherit;
    }
    select:focus, textarea:focus, input:focus {
      outline: none; border-color: #4f80ff; background: #fff;
    }
    textarea { resize: vertical; min-height: 120px; line-height: 1.5; }

    .color-row { display: flex; align-items: center; gap: 10px; }
    input[type="color"] {
      width: 40px; height: 36px; border: 1px solid #ddd; border-radius: 6px;
      padding: 2px; cursor: pointer; background: #fafafa;
    }
    input[type="range"] { flex: 1; accent-color: #4f80ff; }
    #alpha-value { font-size: 12px; color: #555; min-width: 32px; text-align: right; }

    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .size-row { display: flex; gap: 10px; }
    .size-row .field { flex: 1; }
    .size-row input[type="number"] { width: 100%; }

    /* ── Custom font dropdown ── */
    .font-row { display: flex; gap: 6px; align-items: stretch; }
    #font-dropdown { flex: 1; min-width: 0; position: relative; }

    #font-dropdown-btn {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      gap: 6px; padding: 8px 10px;
      border: 1px solid #ddd; border-radius: 6px;
      background: #fafafa; cursor: pointer;
      text-align: left; transition: border-color 0.15s;
    }
    #font-dropdown-btn:hover, #font-dropdown-btn.open { border-color: #4f80ff; background: #fff; }

    #font-dropdown-label {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-size: 17px; color: #222;
    }
    #font-dropdown-arrow { font-size: 10px; color: #999; flex-shrink: 0; transition: transform 0.15s; }
    #font-dropdown-btn.open #font-dropdown-arrow { transform: rotate(180deg); }

    #font-dropdown-menu {
      position: fixed;
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.13);
      max-height: 280px; overflow-y: auto;
      z-index: 600; display: none;
      min-width: 180px;
    }
    #font-dropdown-menu.open { display: block; }

    .fd-option {
      padding: 9px 14px; cursor: pointer; font-size: 18px; color: #222;
      border-bottom: 1px solid #f5f5f5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.1s;
    }
    .fd-option:last-child { border-bottom: none; }
    .fd-option:hover { background: #f0f4ff; }
    .fd-option.selected { background: #eef1ff; color: #4f80ff; }

    #btn-manage-fonts {
      padding: 0 10px; background: #f0f4ff; color: #4f80ff;
      border: 1px solid #c5d3ff; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    #btn-manage-fonts:hover { background: #dce6ff; }

    #btn-print {
      margin-top: auto; padding: 12px;
      background: #4f80ff; color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    #btn-print:hover { background: #3a6aee; }

    /* ── Preview area ── */
    #preview-area {
      flex: 1; padding: 32px;
      display: flex; flex-direction: column; align-items: center; overflow-y: auto;
    }
    #preview-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #aaa; margin-bottom: 16px; align-self: flex-start;
    }

    .paper-page {
      background: #fff; width: 794px; height: 1123px;
      padding: 48px 60px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      border-radius: 4px; margin-bottom: 32px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .paper-content { flex: 1; overflow: hidden; }
    .page-number {
      text-align: center; font-size: 11px; color: #aaa;
      padding-top: 8px; letter-spacing: 0.05em; flex-shrink: 0;
    }

    /* ── English lines ── */
    .en-row { position: relative; }
    .en-lines { position: relative; width: 100%; overflow: visible; }
    .en-guide-text {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 4px; line-height: 1;
      white-space: pre; overflow: visible; pointer-events: none; z-index: 2;
    }

    /* ── Korean grid ── */
    .ko-row {
      display: flex; flex-wrap: nowrap; margin-bottom: 4px;
      border-top: 1.5px solid #e53935; border-left: 1.5px solid #e53935;
    }
    .ko-cell {
      position: relative;
      border-right: 1.5px solid #e53935; border-bottom: 1.5px solid #e53935;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .ko-cell::before, .ko-cell::after {
      content: ''; position: absolute;
      background: rgba(229,57,53,0.25); pointer-events: none;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .ko-cell::before { width: 1px; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); }
    .ko-cell::after  { height: 1px; left: 0; right: 0; top: 50%; transform: translateY(-50%); }
    .ko-char { position: relative; z-index: 2; line-height: 1; text-align: center; }

    /* ── Font Manager Modal ── */
    #font-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #font-modal-overlay.open { display: flex; }

    #font-modal {
      background: #fff; border-radius: 12px;
      width: 860px; max-width: 96vw; height: 640px; max-height: 92vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    #fm-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid #eee; flex-shrink: 0;
    }
    #fm-header h2 { font-size: 16px; font-weight: 700; }

    #fm-locale-tabs { display: flex; gap: 4px; }
    .fm-tab {
      padding: 5px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; border: 1.5px solid #ddd;
      background: #fff; cursor: pointer; color: #666; transition: all 0.15s;
    }
    .fm-tab.active { background: #4f80ff; border-color: #4f80ff; color: #fff; }

    #fm-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: #f0f0f0; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #555; transition: background 0.15s;
    }
    #fm-close:hover { background: #e0e0e0; }

    #fm-body { display: flex; flex: 1; overflow: hidden; }

    /* Left: Search */
    #fm-left {
      width: 420px; min-width: 420px;
      border-right: 1px solid #eee;
      display: flex; flex-direction: column; padding: 16px; gap: 10px;
    }

    #fm-preview-input-row { display: flex; gap: 8px; align-items: center; }
    #fm-preview-input-row label { font-size: 11px; color: #888; white-space: nowrap; }
    #fm-preview-text { flex: 1; font-size: 13px; }

    #fm-search-row { display: flex; gap: 8px; }
    #fm-search { flex: 1; font-size: 14px; }
    #fm-search-clear {
      padding: 0 10px; border: 1px solid #ddd; border-radius: 6px;
      background: #fafafa; cursor: pointer; font-size: 13px; color: #888;
    }
    #fm-search-clear:hover { background: #eee; }

    #fm-results { flex: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }

    .fm-result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-bottom: 1px solid #f0f0f0; transition: background 0.1s;
    }
    .fm-result-item:last-child { border-bottom: none; }
    .fm-result-item:hover { background: #fafafa; }

    .fm-result-info { flex: 1; min-width: 0; }
    .fm-result-name { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 3px; }
    .fm-result-preview {
      font-size: 20px; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #222;
    }

    .fm-add-btn {
      padding: 5px 10px; background: #eef2ff; color: #4f80ff;
      border: 1.5px solid #c5d3ff; border-radius: 6px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    .fm-add-btn:hover { background: #dce6ff; }
    .fm-add-btn.added { background: #e8f5e9; color: #388e3c; border-color: #a5d6a7; cursor: default; }

    .fm-no-results { padding: 32px; text-align: center; color: #aaa; font-size: 13px; }
    .fm-load-more { display: block; width: 100%; padding: 12px; border: none; border-top: 1px solid #eee; background: #fafafa; color: #555; font-size: 13px; cursor: pointer; }
    .fm-load-more:hover { background: #f0f0f0; }

    /* Right: Font list */
    #fm-right {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px; gap: 10px; overflow: hidden;
    }
    #fm-right-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    #fm-right-header span {
      font-size: 12px; font-weight: 700; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    #fm-right-hint { font-size: 11px; color: #bbb; }

    #fm-list {
      flex: 1; overflow-y: auto;
      border: 1px solid #eee; border-radius: 8px;
    }

    /* ── List item with drag handle ── */
    .fm-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-bottom: 1px solid #f0f0f0;
      cursor: context-menu;
      transition: background 0.1s;
      user-select: none;
    }
    .fm-list-item:last-child { border-bottom: none; }
    .fm-list-item:hover { background: #fafafa; }
    .fm-list-item.drag-over { background: #eef2ff; border-top: 2px solid #4f80ff; }
    .fm-list-item.dragging { opacity: 0.4; }

    .drag-handle {
      cursor: grab; color: #ccc; font-size: 16px;
      display: flex; flex-direction: column; gap: 2px;
      padding: 2px 4px; flex-shrink: 0;
      transition: color 0.1s;
    }
    .drag-handle:hover { color: #999; }
    .drag-handle:active { cursor: grabbing; }
    /* Two rows of dots */
    .drag-handle::before, .drag-handle::after {
      content: '⠿'; line-height: 1;
    }
    .drag-handle::after { display: none; }

    .fm-list-info { flex: 1; min-width: 0; }
    .fm-list-name { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .fm-list-item:first-child .fm-list-name::after {
      content: ' ★ default'; color: #f9a825; font-size: 10px;
    }
    .fm-list-preview {
      font-size: 22px; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #222;
    }

    #fm-empty-hint {
      padding: 32px; text-align: center; color: #bbb; font-size: 13px; display: none;
    }

    /* ── Right-click context menu ── */
    #ctx-menu {
      position: fixed; z-index: 2000;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 8px; padding: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      display: none; min-width: 160px;
    }
    #ctx-menu.open { display: block; }

    .ctx-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 6px;
      font-size: 13px; cursor: pointer;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: #fff0f0; color: #e53935; }
    .ctx-item-icon { font-size: 14px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: #333; color: #fff; border-radius: 24px;
      padding: 10px 20px; font-size: 13px; font-weight: 500;
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 3000; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Hide mobile tabs on desktop */
    #mobile-tabs { display: none; }

    /* ── Mobile (≤549px) ── */
    @media (max-width: 549px) {
      body { flex-direction: column; }

      /* Tab bar */
      #mobile-tabs {
        display: flex; position: sticky; top: 0; z-index: 500;
        background: #fff; border-bottom: 1px solid #ddd; flex-shrink: 0;
      }
      .mob-tab {
        flex: 1; padding: 12px 0; font-size: 13px; font-weight: 600;
        border: none; background: none; color: #888; cursor: pointer;
        border-bottom: 2px solid transparent; transition: all 0.15s;
      }
      .mob-tab.active { color: #4f80ff; border-bottom-color: #4f80ff; }

      #sidebar {
        width: 100%; min-width: 0; height: auto;
        position: static; border-right: none; border-bottom: 1px solid #ddd;
        padding: 16px;
      }
      #sidebar.mob-hidden { display: none; }

      #preview-area { padding: 16px 12px; }
      #preview-area.mob-hidden { display: none; }

      /* Scale the A4 paper to fit the screen */
      #paper-container {
        transform-origin: top center;
        transform: scale(var(--mob-scale, 1));
        /* shrink the layout footprint to the scaled size */
        margin-bottom: calc((1123px * var(--mob-scale, 1) - 1123px));
      }

      /* Print button: always full-width at bottom in controls tab */
      #btn-print { position: static; width: 100%; margin-top: 16px; }

      /* Font modal: full-screen, stack panels */
      #font-modal { width: 100%; max-width: 100vw; height: 100%; max-height: 100vh; border-radius: 0; }
      #fm-body { flex-direction: column; }
      #fm-left { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #eee; max-height: 55vh; }
      #fm-right { max-height: 45vh; }
    }

    /* ── Print ── */
    /* A4 @96dpi = 794×1123px. margin:0 lets the fixed-px page map 1:1 to the
       sheet, so the grid keeps the exact geometry it has in the preview. */
    @page { size: A4; margin: 0; }
    @media print {
      body { background: #fff; display: block; }
      .paper-page, .ko-row, .ko-cell, .ko-cell::before, .ko-cell::after {
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      #sidebar, #font-modal-overlay, #ctx-menu, #toast { display: none !important; }
      #mobile-tabs { display: none !important; }
      #preview-area { display: block; padding: 0; overflow: visible; }
      #preview-label { display: none; }
      #paper-container { width: auto; }
      .paper-page {
        width: 794px; height: 1123px; padding: 48px 60px 40px;
        box-shadow: none; border-radius: 0; margin: 0; page-break-after: always;
        overflow: hidden;
      }
      .paper-page:last-child { page-break-after: avoid; }
      .paper-content { overflow: hidden; }
    }
  </style>
</head>
<body>

<!-- ── Mobile tab bar (hidden on desktop via CSS) ── -->
<div id="mobile-tabs">
  <button class="mob-tab active" data-panel="sidebar">⚙ Controls</button>
  <button class="mob-tab" data-panel="preview-area">👁 Preview</button>
</div>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <h1>✏️ Writing Practice<span class="version">v1.0.1</span></h1>

  <div class="field">
    <label>Locale</label>
    <select id="locale">
      <option value="en">English</option>
      <option value="ko">Korean (한국어)</option>
    </select>
  </div>

  <div class="field">
    <label>Font</label>
    <div class="font-row">
      <div id="font-dropdown">
        <button id="font-dropdown-btn" type="button">
          <span id="font-dropdown-label">—</span>
          <span id="font-dropdown-arrow">▾</span>
        </button>
        <div id="font-dropdown-menu"></div>
      </div>
      <button id="btn-manage-fonts">⚙ Manage</button>
    </div>
  </div>

  <div class="field">
    <label>Text</label>
    <textarea id="input-text" placeholder="Paste or type your text here…">The quick brown fox jumps over the lazy dog.</textarea>
  </div>

  <div class="field-group">
    <label>Text Color &amp; Opacity</label>
    <div class="color-row">
      <input type="color" id="text-color" value="#222222" />
      <input type="range" id="alpha" min="0" max="100" value="30" />
      <span id="alpha-value">30%</span>
    </div>
  </div>

  <div class="field-group">
    <label>Cell / Line Size</label>
    <div class="size-row">
      <div class="field">
        <label style="font-size:11px">Height (px)</label>
        <input type="number" id="cell-height" value="56" min="20" max="200" />
      </div>
      <div class="field" id="width-field">
        <label style="font-size:11px">Width (px) — KO</label>
        <input type="number" id="cell-width" value="56" min="20" max="200" />
      </div>
    </div>
  </div>

  <div class="field">
    <label>Repeat rows</label>
    <input type="number" id="repeat-rows" value="2" min="1" max="10" />
  </div>

  <div class="field-group">
    <label>Text Offset</label>
    <div class="size-row">
      <div class="field">
        <label style="font-size:11px">Y-offset (px)</label>
        <input type="number" id="text-y-offset" value="-9" min="-40" max="40" />
      </div>
      <div class="field">
        <label style="font-size:11px">Font size (px)</label>
        <input type="number" id="text-font-size" value="49" min="8" max="200" placeholder="auto" />
      </div>
    </div>
  </div>

  <button id="btn-print">🖨️ Print / Save as PDF</button>
</div>

<!-- ── Preview ── -->
<div id="preview-area">
  <div id="preview-label">Preview (A4)</div>
  <div id="paper-container"></div>
</div>

<!-- ── Font Manager Modal ── -->
<div id="font-modal-overlay">
  <div id="font-modal">
    <div id="fm-header">
      <h2>Font Manager</h2>
      <div id="fm-locale-tabs">
        <button class="fm-tab active" data-locale="en">English</button>
        <button class="fm-tab" data-locale="ko">Korean</button>
      </div>
      <button id="fm-close">✕</button>
    </div>
    <div id="fm-body">
      <div id="fm-left">
        <div id="fm-preview-input-row">
          <label>Preview:</label>
          <input type="text" id="fm-preview-text" value="The quick brown fox" />
        </div>
        <div id="fm-search-row">
          <input type="text" id="fm-search" placeholder="Search Google Fonts…" autocomplete="off" />
          <button id="fm-search-clear">✕</button>
        </div>
        <div id="fm-results"></div>
      </div>
      <div id="fm-right">
        <div id="fm-right-header">
          <span>Your Fonts</span>
          <span id="fm-right-hint">First font is default · right-click to delete</span>
        </div>
        <div id="fm-list"></div>
        <div id="fm-empty-hint">No fonts yet — search and add fonts on the left.</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Context menu ── -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-delete">
    <span class="ctx-item-icon">🗑</span> Delete font
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
  const $ = id => document.getElementById(id);

  // ── Google Fonts catalog ─────────────────────────────────────────────────
  const GF_CATALOG = {
    en: [
      'Caveat','Patrick Hand','Kalam','Architects Daughter','Schoolbell','Comic Neue',
      'Indie Flower','Shadows Into Light','Dancing Script','Pacifico','Satisfy',
      'Sacramento','Great Vibes','Homemade Apple','Rock Salt','Covered By Your Grace',
      'Just Another Hand','Reenie Beanie','Yellowtail','Courgette','Allura',
      'Alex Brush','Pinyon Script','Mr Dafoe','Kristi','Marck Script','Damion',
      'Lobster','Righteous','Fredoka One','Nunito','Quicksand','Poppins',
      'Raleway','Montserrat','Open Sans','Lato','Roboto','Oswald',
      'Merriweather','Playfair Display','Libre Baskerville','Crimson Text','EB Garamond',
      'Special Elite','Courier Prime','Inconsolata','Space Mono','Caveat Brush',
      'Gochi Hand','Handlee','Amatic SC','Permanent Marker','Nothing You Could Do',
    ],
    ko: [
      'Nanum Pen Script','Gamja Flower','Cute Font','Do Hyeon','Noto Sans KR',
      'Nanum Gothic','Nanum Myeongjo','Black Han Sans','Jua','Poor Story',
      'Single Day','Sunflower','East Sea Dokdo','Hi Melody','Gaegu',
      'Gothic A1','Hahmlet','IBM Plex Sans KR','Gugi','Yeon Sung',
      'Nanum Brush Script','Dokdo','Song Myung','Nanum Gothic Coding','Gowun Dodum',
      'Gowun Batang','Dongle','Stylish','Noto Serif KR',
    ],
  };

  const STACK = { en: ', cursive', ko: ', sans-serif' };
  const fontFamily = (name, locale) => `'${name}'${STACK[locale] || ', sans-serif'}`;

  // ── Google Font loader ────────────────────────────────────────────────────
  const loadedFonts = new Set();
  function loadGoogleFont(name) {
    if (loadedFonts.has(name)) return;
    loadedFonts.add(name);
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(name)}&display=swap`;
    document.head.appendChild(link);
  }

  // ── localStorage ──────────────────────────────────────────────────────────
  const LS       = loc => `wp_fonts_${loc}`;
  const LS_SETTINGS = loc => `wp_settings_${loc}`;

  const DEFAULT_FONTS = {
    en: ['Kalam'],
    ko: ['Nanum Myeongjo','Cute Font'],
  };

  const DEFAULT_SETTINGS = {
    en: { font: 'Kalam', height: 56, width: 56, repeat: 2, yOffset: -9, fontSize: 49, alpha: 30, color: '#222222', text: 'The quick brown fox jumps over the lazy dog.' },
    ko: { font: 'Nanum Myeongjo', height: 56, width: 56, repeat: 2, yOffset: 0, fontSize: '', alpha: 30, color: '#222222', text: '빠른 갈색 여우가 게으른 개를 뛰어넘습니다.' },
  };

  function loadUserFonts(loc) {
    try { const r = localStorage.getItem(LS(loc)); if (r) return JSON.parse(r); } catch {}
    return [...DEFAULT_FONTS[loc]];
  }
  function saveUserFonts(loc, list) { localStorage.setItem(LS(loc), JSON.stringify(list)); }

  function loadSettings(loc) {
    try { const r = localStorage.getItem(LS_SETTINGS(loc)); if (r) return { ...DEFAULT_SETTINGS[loc], ...JSON.parse(r) }; } catch {}
    return { ...DEFAULT_SETTINGS[loc] };
  }
  function saveSettings(loc) {
    const s = {
      font:     fdLabel.textContent,
      height:   $('cell-height').value,
      width:    $('cell-width').value,
      repeat:   $('repeat-rows').value,
      yOffset:  $('text-y-offset').value,
      fontSize: $('text-font-size').value,
      alpha:    $('alpha').value,
      color:    $('text-color').value,
      text:     $('input-text').value,
    };
    localStorage.setItem(LS_SETTINGS(loc), JSON.stringify(s));
  }

  function applySettings(loc) {
    const s = loadSettings(loc);
    $('cell-height').value    = s.height;
    $('cell-width').value     = s.width;
    $('repeat-rows').value    = s.repeat;
    $('text-y-offset').value  = s.yOffset;
    $('text-font-size').value = s.fontSize;
    $('alpha').value          = s.alpha;
    $('alpha-value').textContent = s.alpha + '%';
    $('text-color').value     = s.color;
    $('input-text').value     = s.text;
    // font is applied separately via selectFont after buildDropdown
    return s.font;
  }

  const userFonts = { en: loadUserFonts('en'), ko: loadUserFonts('ko') };
  ['en','ko'].forEach(l => userFonts[l].forEach(loadGoogleFont));

  // ── State ─────────────────────────────────────────────────────────────────
  let currentFont = '';   // full CSS font-family string

  // ── Custom font dropdown ──────────────────────────────────────────────────
  const fdBtn    = $('font-dropdown-btn');
  const fdMenu   = $('font-dropdown-menu');
  const fdLabel  = $('font-dropdown-label');

  function buildDropdown() {
    const locale = $('locale').value;
    const list   = userFonts[locale];
    fdMenu.innerHTML = '';

    list.forEach(name => {
      const opt = document.createElement('div');
      opt.className = 'fd-option' + (fontFamily(name, locale) === currentFont ? ' selected' : '');
      opt.style.fontFamily = fontFamily(name, locale);
      opt.textContent = name;
      opt.dataset.name = name;
      opt.onclick = () => {
        selectFont(name, locale);
        closeDropdown();
      };
      fdMenu.appendChild(opt);
    });
  }

  function selectFont(name, locale, skipSave = false) {
    const ff = fontFamily(name, locale);
    currentFont = ff;
    fdLabel.textContent = name;
    fdLabel.style.fontFamily = ff;
    document.querySelectorAll('.fd-option').forEach(o => {
      o.classList.toggle('selected', o.dataset.name === name);
    });
    if (!skipSave) saveSettings(locale);
    render();
  }

  function openDropdown() {
    buildDropdown();
    const rect = fdBtn.getBoundingClientRect();
    fdMenu.style.top    = (rect.bottom + 4) + 'px';
    fdMenu.style.left   = rect.left + 'px';
    fdMenu.style.width  = rect.width + 'px';
    fdMenu.classList.add('open');
    fdBtn.classList.add('open');
  }

  function closeDropdown() {
    fdMenu.classList.remove('open');
    fdBtn.classList.remove('open');
  }

  fdBtn.onclick = e => {
    e.stopPropagation();
    fdMenu.classList.contains('open') ? closeDropdown() : openDropdown();
  };
  document.addEventListener('click', e => {
    if (!fdMenu.contains(e.target) && e.target !== fdBtn) closeDropdown();
  });

  function initFontForLocale(restoreSettings = false) {
    const locale = $('locale').value;
    const list = userFonts[locale];
    let name;
    if (restoreSettings) {
      const savedFont = applySettings(locale);
      name = list.includes(savedFont) ? savedFont : (list[0] || 'sans-serif');
    } else {
      const first = list[0] || 'sans-serif';
      const currentName = fdLabel.textContent;
      name = list.includes(currentName) ? currentName : first;
    }
    selectFont(name, locale, true);
  }

  // ── Paper rendering ────────────────────────────────────────────────────────
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function buildEnglish(lines, color, alpha, lineH, font, yOffset, fontSize) {
    const frag = document.createDocumentFragment();
    const descZone = Math.round(lineH * 0.30);
    const fs = fontSize || Math.round(lineH * 0.72);

    lines.forEach(line => {
      const row = document.createElement('div');
      row.className = 'en-row';
      row.style.marginBottom = (descZone + 4) + 'px';

      const wrap = document.createElement('div');
      wrap.className = 'en-lines';
      wrap.style.cssText = `height:${lineH}px;position:relative;overflow:visible;`;

      const top = document.createElement('div');
      top.style.cssText = 'position:absolute;top:0;left:0;right:0;height:0;border-top:2px solid #444;';

      const mid = document.createElement('div');
      mid.style.cssText = 'position:absolute;top:45%;left:0;right:0;height:0;border-top:1.5px dashed #bbb;';

      const baseline = document.createElement('div');
      baseline.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:0;border-top:1.5px dashed #bbb;';

      const guide = document.createElement('div');
      guide.className = 'en-guide-text';
      // y-offset shifts bottom anchor: positive = up (further from bottom), negative = down
      guide.style.cssText = `font-size:${fs}px;color:${hexToRgba(color,alpha/100)};font-family:${font};bottom:${yOffset}px;`;
      guide.textContent = line;

      wrap.append(top, mid, baseline, guide);
      row.appendChild(wrap);
      frag.appendChild(row);
    });
    return frag;
  }

  function buildKorean(lines, color, alpha, cH, cW, font, yOffset, fontSize) {
    const frag = document.createDocumentFragment();
    const fs = fontSize || Math.round(Math.min(cH, cW) * 0.72);
    const cols = Math.max(1, Math.floor((794-120) / cW));
    lines.forEach(line => {
      const row = document.createElement('div'); row.className = 'ko-row';
      const chars = [...line];
      for (let i = 0; i < cols; i++) {
        const ch = chars[i] ?? '';
        const cell = document.createElement('div');
        cell.className = 'ko-cell'; cell.style.cssText = `width:${cW}px;height:${cH}px;`;
        if (ch && ch !== ' ') {
          const span = document.createElement('span'); span.className = 'ko-char';
          span.style.cssText = `font-size:${fs}px;color:${hexToRgba(color,alpha/100)};font-family:${font};transform:translateY(${-yOffset}px);display:block;`;
          span.textContent = ch; cell.appendChild(span);
        }
        row.appendChild(cell);
      }
      frag.appendChild(row);
    });
    return frag;
  }

  // measureText cache keyed by "fontSize|font"
  const _mtCache = {};
  function measureWidth(text, fontSpec) {
    if (!_mtCache[fontSpec]) {
      const c = document.createElement('canvas');
      _mtCache[fontSpec] = c.getContext('2d');
      _mtCache[fontSpec].font = fontSpec;
    }
    return _mtCache[fontSpec].measureText(text).width;
  }

  function chunkLine(line, max, wordWrap, maxPx, fontSpec) {
    if (!wordWrap || !maxPx) {
      const out = [];
      for (let i = 0; i < line.length; i += max) out.push(line.slice(i, i + max));
      return out.length ? out : [''];
    }
    // Pixel-accurate word-wrap for English
    const words = line.split(' ');
    const out = [];
    let cur = '';
    for (const word of words) {
      const candidate = cur ? cur + ' ' + word : word;
      if (measureWidth(candidate, fontSpec) <= maxPx) {
        cur = candidate;
      } else {
        if (cur) out.push(cur);
        // Single word wider than line: hard-break by character
        if (measureWidth(word, fontSpec) > maxPx) {
          let part = '';
          for (const ch of word) {
            if (measureWidth(part + ch, fontSpec) <= maxPx) { part += ch; }
            else { out.push(part); part = ch; }
          }
          cur = part;
        } else {
          cur = word;
        }
      }
    }
    if (cur) out.push(cur);
    return out.length ? out : [''];
  }

  function render() {
    const locale   = $('locale').value;
    const rawText  = $('input-text').value;
    const color    = $('text-color').value;
    const alpha    = parseInt($('alpha').value);
    const lineH    = parseInt($('cell-height').value) || 56;
    const cellWVal = parseInt($('cell-width').value) || 56;
    const repeat   = parseInt($('repeat-rows').value) || 1;
    const font     = currentFont || fontFamily(userFonts[locale][0] || 'sans-serif', locale);
    const yOffset  = parseInt($('text-y-offset').value) || 0;
    const fontSizeOverride = parseInt($('text-font-size').value) || 0;

    $('width-field').style.display = locale === 'ko' ? 'block' : 'none';
    const con = $('paper-container'); con.innerHTML = '';

    const pw = 794-120;
    const maxKo = Math.max(1, Math.floor(pw / cellWVal));
    const enFontSize = fontSizeOverride || Math.round(lineH * 0.72);
    const enFontSpec = `${enFontSize}px ${font}`;
    // subtract en-guide-text padding (4px each side) + small safety buffer for font rendering
    const enMaxPx = pw - 8 - 6;

    let exp = [];
    rawText.split('\n').forEach(line => {
      if (!line.trim()) { exp.push(''); return; }
      if (locale === 'ko') {
        const maxKoChars = maxKo;
        chunkLine(line, maxKoChars, false).forEach(c => { for (let r=0;r<repeat;r++) exp.push(c); });
      } else {
        chunkLine(line, 0, true, enMaxPx, enFontSpec).forEach(c => { for (let r=0;r<repeat;r++) exp.push(c); });
      }
    });

    const rowH = locale === 'ko' ? lineH + 4 : lineH + Math.round(lineH * 0.30) + 4;
    const perPage = Math.max(1, Math.floor((1123-48-40-28) / rowH));
    while (exp.length < perPage) exp.push('');

    const pages = [];
    for (let i=0; i<exp.length; i+=perPage) pages.push(exp.slice(i, i+perPage));
    const last = pages[pages.length-1];
    while (last.length < perPage) last.push('');

    pages.forEach((lines, idx) => {
      const page = document.createElement('div'); page.className = 'paper-page';
      const content = document.createElement('div'); content.className = 'paper-content';
      content.appendChild(locale==='ko'
        ? buildKorean(lines,color,alpha,lineH,cellWVal,font,yOffset,fontSizeOverride)
        : buildEnglish(lines,color,alpha,lineH,font,yOffset,fontSizeOverride));
      const num = document.createElement('div'); num.className = 'page-number';
      num.textContent = pages.length > 1 ? `— ${idx+1} / ${pages.length} —` : '';
      page.append(content, num); con.appendChild(page);
    });
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Context menu ──────────────────────────────────────────────────────────
  const ctxMenu = $('ctx-menu');
  let ctxTargetIdx = -1;

  function openCtxMenu(x, y, idx) {
    ctxTargetIdx = idx;
    ctxMenu.style.left = x + 'px';
    ctxMenu.style.top  = y + 'px';
    ctxMenu.classList.add('open');
  }
  function closeCtxMenu() { ctxMenu.classList.remove('open'); ctxTargetIdx = -1; }

  document.addEventListener('click', () => closeCtxMenu());
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeCtxMenu(); });

  $('ctx-delete').onclick = () => {
    if (ctxTargetIdx < 0) return;
    const list = userFonts[fmLocale];
    if (list.length <= 1) { showToast("It's the only font you have"); closeCtxMenu(); return; }
    list.splice(ctxTargetIdx, 1);
    saveUserFonts(fmLocale, list);
    renderFmList();
    renderFmResults(fmSearch.value);
    // If we're editing the active locale, refresh sidebar
    if (fmLocale === $('locale').value) initFontForLocale();
    closeCtxMenu();
  };

  // ── Font Manager ──────────────────────────────────────────────────────────
  const overlay      = $('font-modal-overlay');
  const fmSearch     = $('fm-search');
  const fmPreviewTxt = $('fm-preview-text');
  let fmLocale = $('locale').value;
  let searchDebounce = null;

  // Drag state
  let dragSrcIdx = -1;

  function openModal() {
    fmLocale = $('locale').value;
    syncTabs();
    updatePreviewPlaceholder();
    renderFmList();
    renderFmResults('');
    overlay.classList.add('open');
    fmSearch.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    // Refresh sidebar dropdown for active locale
    if (fmLocale === $('locale').value) {
      buildDropdown();
      initFontForLocale();
    }
  }

  function syncTabs() {
    document.querySelectorAll('.fm-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.locale === fmLocale));
  }

  function updatePreviewPlaceholder() {
    fmPreviewTxt.value = fmLocale==='ko' ? '안녕하세요 반갑습니다' : 'The quick brown fox';
  }

  // ── Search results ────────────────────────────────────────────────────────
  function renderFmResults(query) {
    const res = $('fm-results'); res.innerHTML = '';
    const q = query.trim().toLowerCase();
    const catalog = GF_CATALOG[fmLocale] || [];
    const filtered = q ? catalog.filter(n => n.toLowerCase().includes(q)) : catalog;

    if (!filtered.length) {
      res.innerHTML = `<div class="fm-no-results">No fonts match "${query}"</div>`; return;
    }

    const userList = userFonts[fmLocale];
    const prev = fmPreviewTxt.value || (fmLocale==='ko' ? '가나다라' : 'Aa Bb');

    const PAGE = 40;
    let shown = 0;

    function appendResults(batch) {
      batch.forEach(name => {
        loadGoogleFont(name);
        const already = userList.includes(name);

        const item = document.createElement('div'); item.className = 'fm-result-item';
        const info = document.createElement('div'); info.className = 'fm-result-info';
        const nameEl = document.createElement('div'); nameEl.className = 'fm-result-name';
        nameEl.textContent = name;
        const preview = document.createElement('div'); preview.className = 'fm-result-preview';
        preview.style.fontFamily = fontFamily(name, fmLocale);
        preview.textContent = prev;
        info.append(nameEl, preview);

        const btn = document.createElement('button');
        btn.className = 'fm-add-btn' + (already ? ' added' : '');
        btn.textContent = already ? '✓ Added' : '+ Add';
        btn.disabled = already;
        btn.onclick = () => {
          if (userFonts[fmLocale].includes(name)) return;
          loadGoogleFont(name);
          userFonts[fmLocale].push(name);
          saveUserFonts(fmLocale, userFonts[fmLocale]);
          btn.className = 'fm-add-btn added'; btn.textContent = '✓ Added'; btn.disabled = true;
          renderFmList();
        };

        item.append(info, btn);
        res.appendChild(item);
      });
    }

    function renderMore() {
      const existing = res.querySelector('.fm-load-more');
      if (existing) existing.remove();
      appendResults(filtered.slice(shown, shown + PAGE));
      shown = Math.min(shown + PAGE, filtered.length);
      if (shown < filtered.length) {
        const more = document.createElement('button');
        more.className = 'fm-load-more';
        more.textContent = `Load more (${filtered.length - shown} remaining)`;
        more.onclick = renderMore;
        res.appendChild(more);
      }
    }

    renderMore();
  }

  // ── Font list (right panel) ───────────────────────────────────────────────
  function renderFmList() {
    const fmList = $('fm-list'); fmList.innerHTML = '';
    const list = userFonts[fmLocale];
    const prev = fmPreviewTxt.value || (fmLocale==='ko' ? '가나다라' : 'Aa Bb');

    $('fm-empty-hint').style.display = list.length ? 'none' : 'block';

    list.forEach((name, idx) => {
      const item = document.createElement('div');
      item.className = 'fm-list-item';
      item.draggable = true;
      item.dataset.idx = idx;

      // Drag handle
      const handle = document.createElement('div');
      handle.className = 'drag-handle';
      handle.title = 'Drag to reorder';

      // Font info
      const info = document.createElement('div'); info.className = 'fm-list-info';
      const nameEl = document.createElement('div'); nameEl.className = 'fm-list-name';
      nameEl.textContent = name;
      // Preview shows the font name itself, rendered in that font
      const preview = document.createElement('div'); preview.className = 'fm-list-preview';
      preview.style.fontFamily = fontFamily(name, fmLocale);
      preview.textContent = name;   // ← font name as preview text

      info.append(nameEl, preview);
      item.append(handle, info);
      fmList.appendChild(item);

      // ── Drag events ──
      item.addEventListener('dragstart', e => {
        dragSrcIdx = idx;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        document.querySelectorAll('.fm-list-item').forEach(el => el.classList.remove('drag-over'));
      });
      item.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.fm-list-item').forEach(el => el.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });
      item.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrcIdx < 0 || dragSrcIdx === idx) return;
        const moved = list.splice(dragSrcIdx, 1)[0];
        list.splice(idx, 0, moved);
        saveUserFonts(fmLocale, list);
        dragSrcIdx = -1;
        renderFmList();
      });

      // ── Right-click ──
      item.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        openCtxMenu(e.clientX, e.clientY, idx);
      });
    });
  }

  // ── Event wiring ──────────────────────────────────────────────────────────
  $('btn-manage-fonts').onclick = openModal;
  $('fm-close').onclick = closeModal;
  overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });

  document.querySelectorAll('.fm-tab').forEach(tab => {
    tab.onclick = () => {
      fmLocale = tab.dataset.locale;
      syncTabs();
      updatePreviewPlaceholder();
      renderFmList();
      renderFmResults(fmSearch.value);
    };
  });

  fmSearch.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => renderFmResults(fmSearch.value), 180);
  });

  $('fm-search-clear').onclick = () => { fmSearch.value=''; renderFmResults(''); fmSearch.focus(); };

  fmPreviewTxt.addEventListener('input', () => {
    document.querySelectorAll('.fm-result-preview').forEach(el => el.textContent = fmPreviewTxt.value);
    // Keep fm-list previews as font name (don't override)
  });

  let _prevLocale = $('locale').value;
  $('locale').addEventListener('input', () => {
    saveSettings(_prevLocale);           // save old locale before switching
    _prevLocale = $('locale').value;
    initFontForLocale(true);             // restore settings for new locale
    render();
  });

  // Base ratio: fontSize 49 / height 56
  const BASE_HEIGHT = 56;
  const BASE_FONTSIZE = 49;

  $('cell-height').addEventListener('input', () => {
    const locale = $('locale').value;
    const h = parseInt($('cell-height').value) || BASE_HEIGHT;
    if (locale === 'en') {
      const fs = Math.round(BASE_FONTSIZE * h / BASE_HEIGHT);
      $('text-font-size').value = fs;
    }
    saveSettings(locale); render();
  });

  $('text-font-size').addEventListener('input', () => { saveSettings($('locale').value); render(); });

  ['input-text','text-color','cell-width','repeat-rows','text-y-offset'].forEach(id => {
    $(id).addEventListener('input', () => { saveSettings($('locale').value); render(); });
  });
  $('alpha').addEventListener('input', () => {
    $('alpha-value').textContent = $('alpha').value + '%';
    saveSettings($('locale').value); render();
  });
  $('btn-print').onclick = () => window.print();

  // ── Init ──────────────────────────────────────────────────────────────────
  initFontForLocale(true);   // restore last session settings
  render();

  // ── Mobile tabs & paper scaling ──────────────────────────────────────────
  const MOBILE_BP = 549;

  function setMobPaperScale() {
    const container = $('paper-container');
    if (!container) return;
    const available = window.innerWidth - 24; // 12px padding each side
    const scale = Math.min(1, available / 794);
    container.style.setProperty('--mob-scale', scale);
    // Collapse the layout height so there's no giant whitespace gap
    container.style.marginBottom = ((1123 * scale) - 1123) + 'px';
  }

  function applyMobileLayout() {
    const isMobile = window.innerWidth <= MOBILE_BP;
    $('mobile-tabs').style.display = isMobile ? 'flex' : 'none';
    if (!isMobile) {
      // Reset any mobile classes when resizing back to desktop
      $('sidebar').classList.remove('mob-hidden');
      $('preview-area').classList.remove('mob-hidden');
    } else {
      // Show only the active tab's panel
      const activeTab = document.querySelector('.mob-tab.active');
      const showPanel = activeTab?.dataset.panel || 'sidebar';
      ['sidebar', 'preview-area'].forEach(id => {
        $(id).classList.toggle('mob-hidden', id !== showPanel);
      });
      setMobPaperScale();
    }
  }

  // Tab switching
  document.querySelectorAll('.mob-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const show = tab.dataset.panel;
      ['sidebar', 'preview-area'].forEach(id => {
        $(id).classList.toggle('mob-hidden', id !== show);
      });
      if (show === 'preview-area') setMobPaperScale();
    });
  });

  applyMobileLayout();
  window.addEventListener('resize', applyMobileLayout);
</script>
</body>
</html>
