<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing Practice Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100vh;
      overflow-y: auto;
      position: sticky;
      top: 0;
    }

    h1 { font-size: 18px; font-weight: 700; color: #111; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
    }

    select, textarea, input[type="text"], input[type="number"] {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fafafa;
      color: #333;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    select:focus, textarea:focus, input:focus {
      outline: none; border-color: #4f80ff; background: #fff;
    }

    textarea { resize: vertical; min-height: 120px; line-height: 1.5; }

    .color-row { display: flex; align-items: center; gap: 10px; }

    input[type="color"] {
      width: 40px; height: 36px;
      border: 1px solid #ddd; border-radius: 6px;
      padding: 2px; cursor: pointer; background: #fafafa;
    }

    input[type="range"] { flex: 1; accent-color: #4f80ff; }

    #alpha-value { font-size: 12px; color: #555; min-width: 32px; text-align: right; }

    .field-group { display: flex; flex-direction: column; gap: 8px; }

    .size-row { display: flex; gap: 10px; }
    .size-row .field { flex: 1; }
    .size-row input[type="number"] { width: 100%; }

    /* Font row: select + manage button */
    .font-row { display: flex; gap: 6px; align-items: stretch; }
    .font-row select { flex: 1; min-width: 0; }

    #btn-manage-fonts {
      padding: 0 10px;
      background: #f0f4ff;
      color: #4f80ff;
      border: 1px solid #c5d3ff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #btn-manage-fonts:hover { background: #dce6ff; }

    #btn-print {
      margin-top: auto;
      padding: 12px;
      background: #4f80ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-print:hover { background: #3a6aee; }

    /* ── Preview area ── */
    #preview-area {
      flex: 1;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
    }

    #preview-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #aaa; margin-bottom: 16px; align-self: flex-start;
    }

    .paper-page {
      background: #fff;
      width: 794px; height: 1123px;
      padding: 48px 60px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      border-radius: 4px; margin-bottom: 32px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .paper-content { flex: 1; overflow: hidden; }

    .page-number {
      text-align: center; font-size: 11px; color: #aaa;
      padding-top: 8px; letter-spacing: 0.05em; flex-shrink: 0;
    }

    /* ── English lined rows ── */
    .en-row { position: relative; margin-bottom: 8px; }
    .en-lines { position: relative; width: 100%; }
    .en-guide-text {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; padding: 0 4px;
      white-space: pre; overflow: hidden;
      pointer-events: none; z-index: 2;
    }

    /* ── Korean grid rows ── */
    .ko-row {
      display: flex; flex-wrap: nowrap; margin-bottom: 4px;
      border-top: 1.5px solid #e53935;
      border-left: 1.5px solid #e53935;
    }
    .ko-cell {
      position: relative;
      border-right: 1.5px solid #e53935;
      border-bottom: 1.5px solid #e53935;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .ko-cell::before, .ko-cell::after {
      content: ''; position: absolute;
      background: rgba(229, 57, 53, 0.25); pointer-events: none;
    }
    .ko-cell::before { width: 1px; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); }
    .ko-cell::after  { height: 1px; left: 0; right: 0; top: 50%; transform: translateY(-50%); }
    .ko-char { position: relative; z-index: 2; line-height: 1; text-align: center; }

    /* ── Font Manager Modal ── */
    #font-modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #font-modal-overlay.open { display: flex; }

    #font-modal {
      background: #fff;
      border-radius: 12px;
      width: 860px;
      max-width: 96vw;
      height: 640px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    #fm-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    #fm-header h2 { font-size: 16px; font-weight: 700; }

    #fm-locale-tabs { display: flex; gap: 4px; }
    .fm-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px; font-weight: 600;
      border: 1.5px solid #ddd;
      background: #fff; cursor: pointer; color: #666;
      transition: all 0.15s;
    }
    .fm-tab.active { background: #4f80ff; border-color: #4f80ff; color: #fff; }

    #fm-close {
      width: 28px; height: 28px;
      border-radius: 50%; border: none;
      background: #f0f0f0; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #555; transition: background 0.15s;
    }
    #fm-close:hover { background: #e0e0e0; }

    #fm-body {
      display: flex; flex: 1; overflow: hidden;
    }

    /* Left: Search */
    #fm-left {
      width: 420px; min-width: 420px;
      border-right: 1px solid #eee;
      display: flex; flex-direction: column;
      padding: 16px;
      gap: 10px;
    }

    #fm-preview-input-row {
      display: flex; gap: 8px; align-items: center;
    }
    #fm-preview-input-row label { font-size: 11px; color: #888; white-space: nowrap; }
    #fm-preview-text { flex: 1; font-size: 13px; }

    #fm-search-row { display: flex; gap: 8px; }
    #fm-search { flex: 1; font-size: 14px; }
    #fm-search-clear {
      padding: 0 10px; border: 1px solid #ddd; border-radius: 6px;
      background: #fafafa; cursor: pointer; font-size: 13px; color: #888;
    }
    #fm-search-clear:hover { background: #eee; }

    #fm-results {
      flex: 1; overflow-y: auto;
      border: 1px solid #eee; border-radius: 8px;
    }

    .fm-result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }
    .fm-result-item:last-child { border-bottom: none; }
    .fm-result-item:hover { background: #fafafa; }

    .fm-result-info { flex: 1; min-width: 0; }
    .fm-result-name { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 3px; }
    .fm-result-preview {
      font-size: 20px; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #222;
    }

    .fm-add-btn {
      padding: 5px 10px;
      background: #eef2ff; color: #4f80ff;
      border: 1.5px solid #c5d3ff; border-radius: 6px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      white-space: nowrap; transition: background 0.15s;
      flex-shrink: 0;
    }
    .fm-add-btn:hover { background: #dce6ff; }
    .fm-add-btn.added { background: #e8f5e9; color: #388e3c; border-color: #a5d6a7; cursor: default; }

    .fm-no-results {
      padding: 32px; text-align: center; color: #aaa; font-size: 13px;
    }

    /* Right: Current list */
    #fm-right {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px; gap: 10px; overflow: hidden;
    }

    #fm-right-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    #fm-right-header span { font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    #fm-right-hint { font-size: 11px; color: #bbb; }

    #fm-list {
      flex: 1; overflow-y: auto;
      border: 1px solid #eee; border-radius: 8px;
    }

    .fm-list-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }
    .fm-list-item:last-child { border-bottom: none; }
    .fm-list-item:hover { background: #fafafa; }

    .fm-order-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
    .fm-order-btn {
      width: 20px; height: 18px;
      border: 1px solid #ddd; border-radius: 3px;
      background: #f5f5f5; cursor: pointer; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #666; transition: background 0.1s;
    }
    .fm-order-btn:hover:not(:disabled) { background: #e0e8ff; color: #4f80ff; border-color: #c5d3ff; }
    .fm-order-btn:disabled { opacity: 0.3; cursor: default; }

    .fm-list-info { flex: 1; min-width: 0; }
    .fm-list-name { font-size: 11px; color: #888; margin-bottom: 2px; }
    .fm-list-preview {
      font-size: 18px; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #222;
    }
    .fm-list-item:first-child .fm-list-name::after {
      content: ' ★ default';
      color: #f9a825; font-size: 10px;
    }

    .fm-remove-btn {
      width: 22px; height: 22px;
      border-radius: 50%; border: none;
      background: #fee; color: #e53935;
      font-size: 14px; cursor: pointer; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.1s;
    }
    .fm-remove-btn:hover { background: #fcc; }

    #fm-empty-hint {
      padding: 32px; text-align: center; color: #bbb; font-size: 13px;
      display: none;
    }

    /* ── Print styles ── */
    @media print {
      body { background: #fff; }
      #sidebar { display: none !important; }
      #font-modal-overlay { display: none !important; }
      #preview-area { padding: 0; overflow: visible; }
      #preview-label { display: none; }
      .paper-page {
        width: 100%; height: 100vh;
        padding: 15mm 15mm 10mm;
        box-shadow: none; border-radius: 0;
        margin-bottom: 0; page-break-after: always;
      }
      .paper-page:last-child { page-break-after: avoid; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <h1>✏️ Writing Practice</h1>

  <div class="field">
    <label>Locale</label>
    <select id="locale">
      <option value="en">English</option>
      <option value="ko">Korean (한국어)</option>
    </select>
  </div>

  <div class="field">
    <label>Font</label>
    <div class="font-row">
      <select id="font-select"></select>
      <button id="btn-manage-fonts">⚙ Manage</button>
    </div>
  </div>

  <div class="field">
    <label>Text</label>
    <textarea id="input-text" placeholder="Paste or type your text here…">The quick brown fox jumps over the lazy dog.</textarea>
  </div>

  <div class="field-group">
    <label>Text Color &amp; Opacity</label>
    <div class="color-row">
      <input type="color" id="text-color" value="#222222" />
      <input type="range" id="alpha" min="0" max="100" value="30" />
      <span id="alpha-value">30%</span>
    </div>
  </div>

  <div class="field-group">
    <label>Cell / Line Size</label>
    <div class="size-row">
      <div class="field">
        <label style="font-size:11px">Height (px)</label>
        <input type="number" id="cell-height" value="56" min="20" max="200" />
      </div>
      <div class="field" id="width-field">
        <label style="font-size:11px">Width (px) — KO</label>
        <input type="number" id="cell-width" value="56" min="20" max="200" />
      </div>
    </div>
  </div>

  <div class="field">
    <label>Repeat rows</label>
    <input type="number" id="repeat-rows" value="2" min="1" max="10" />
  </div>

  <button id="btn-print">🖨️ Print / Save as PDF</button>
</div>

<!-- ── Preview ── -->
<div id="preview-area">
  <div id="preview-label">Preview (A4)</div>
  <div id="paper-container"></div>
</div>

<!-- ── Font Manager Modal ── -->
<div id="font-modal-overlay">
  <div id="font-modal">
    <div id="fm-header">
      <h2>Font Manager</h2>
      <div id="fm-locale-tabs">
        <button class="fm-tab active" data-locale="en">English</button>
        <button class="fm-tab" data-locale="ko">Korean</button>
      </div>
      <button id="fm-close">✕</button>
    </div>
    <div id="fm-body">
      <!-- Search side -->
      <div id="fm-left">
        <div id="fm-preview-input-row">
          <label>Preview:</label>
          <input type="text" id="fm-preview-text" value="The quick brown fox" />
        </div>
        <div id="fm-search-row">
          <input type="text" id="fm-search" placeholder="Search Google Fonts…" autocomplete="off" />
          <button id="fm-search-clear">✕</button>
        </div>
        <div id="fm-results"></div>
      </div>
      <!-- Current list side -->
      <div id="fm-right">
        <div id="fm-right-header">
          <span>Your Fonts</span>
          <span id="fm-right-hint">First font is the default</span>
        </div>
        <div id="fm-list"></div>
        <div id="fm-empty-hint">No fonts yet — search and add fonts on the left.</div>
      </div>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  // ── Google Fonts catalog ──────────────────────────────────────────────────
  const GF_CATALOG = {
    en: [
      'Caveat','Patrick Hand','Kalam','Architects Daughter','Schoolbell','Comic Neue',
      'Indie Flower','Shadows Into Light','Dancing Script','Pacifico','Satisfy',
      'Sacramento','Great Vibes','Homemade Apple','Rock Salt','Covered By Your Grace',
      'Just Another Hand','Reenie Beanie','Yellowtail','Courgette','Allura',
      'Alex Brush','Pinyon Script','Mr Dafoe','Kristi','Marck Script','Damion',
      'Lobster','Righteous','Fredoka One','Nunito','Quicksand','Poppins',
      'Raleway','Montserrat','Open Sans','Lato','Roboto','Oswald',
      'Merriweather','Playfair Display','Libre Baskerville','Crimson Text','EB Garamond',
      'Special Elite','Courier Prime','Inconsolata','Space Mono','Caveat Brush',
      'Gochi Hand','Handlee','Amatic SC','Permanent Marker','Nothing You Could Do',
    ],
    ko: [
      'Nanum Pen Script','Gamja Flower','Cute Font','Do Hyeon','Noto Sans KR',
      'Nanum Gothic','Nanum Myeongjo','Black Han Sans','Jua','Poor Story',
      'Single Day','Sunflower','East Sea Dokdo','Hi Melody','Gaegu',
      'Gothic A1','Hahmlet','IBM Plex Sans KR','Gugi','Yeon Sung',
      'Nanum Brush Script','Dokdo','Song Myung','Nanum Gothic Coding','Gowun Dodum',
      'Gowun Batang','Dongle','Stylish','Noto Serif KR',
    ],
  };

  // Generic fallback stacks per locale
  const STACK = {
    en: ', cursive',
    ko: ', sans-serif',
  };

  function fontFamily(name, locale) {
    return `'${name}'${STACK[locale] || ', sans-serif'}`;
  }

  // ── Font loading ─────────────────────────────────────────────────────────
  const loadedFonts = new Set();
  // Pre-load initial link tag fonts
  document.querySelectorAll('link[data-gf]').forEach(l => loadedFonts.add(l.dataset.gf));

  function loadGoogleFont(name) {
    if (loadedFonts.has(name)) return;
    loadedFonts.add(name);
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.dataset.gf = name;
    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(name)}&display=swap`;
    document.head.appendChild(link);
  }

  // ── localStorage ─────────────────────────────────────────────────────────
  const LS = locale => `wp_fonts_${locale}`;

  const DEFAULT_FONTS = {
    en: ['Caveat','Patrick Hand','Kalam','Architects Daughter','Schoolbell','Comic Neue'],
    ko: ['Nanum Pen Script','Gamja Flower','Cute Font','Do Hyeon','Noto Sans KR'],
  };

  function loadUserFonts(locale) {
    try {
      const raw = localStorage.getItem(LS(locale));
      if (raw) return JSON.parse(raw);
    } catch {}
    return [...DEFAULT_FONTS[locale]];
  }

  function saveUserFonts(locale, list) {
    localStorage.setItem(LS(locale), JSON.stringify(list));
  }

  // userFonts[locale] = ['Font Name', ...]
  const userFonts = {
    en: loadUserFonts('en'),
    ko: loadUserFonts('ko'),
  };

  // Pre-load all user fonts
  ['en','ko'].forEach(loc => userFonts[loc].forEach(loadGoogleFont));

  // ── Sidebar controls ─────────────────────────────────────────────────────
  const localeEl   = $('locale');
  const fontSelect = $('font-select');
  const textEl     = $('input-text');
  const colorEl    = $('text-color');
  const alphaEl    = $('alpha');
  const alphaVal   = $('alpha-value');
  const cellH      = $('cell-height');
  const cellW      = $('cell-width');
  const repeatRows = $('repeat-rows');
  const container  = $('paper-container');
  const widthField = $('width-field');

  function populateFontSelect() {
    const locale = localeEl.value;
    const prev = fontSelect.value;
    fontSelect.innerHTML = '';
    userFonts[locale].forEach(name => {
      const opt = document.createElement('option');
      opt.value = fontFamily(name, locale);
      opt.textContent = name;
      fontSelect.appendChild(opt);
    });
    // Restore previous selection if still available
    if (prev && [...fontSelect.options].some(o => o.value === prev)) {
      fontSelect.value = prev;
    }
  }

  // ── Paper rendering ───────────────────────────────────────────────────────
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function buildEnglish(lines, color, alpha, lineH, font) {
    const frag = document.createDocumentFragment();
    const fontSize = Math.round(lineH * 0.6);
    lines.forEach(line => {
      const row = document.createElement('div');
      row.className = 'en-row';
      const wrap = document.createElement('div');
      wrap.className = 'en-lines';
      wrap.style.cssText = `height:${lineH}px;position:relative;`;

      const top = document.createElement('div');
      top.style.cssText = 'position:absolute;top:0;left:0;right:0;height:2px;background:#333;';
      const bot = document.createElement('div');
      bot.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:2px;background:#333;';
      const mid = document.createElement('div');
      mid.style.cssText = 'position:absolute;top:50%;left:0;right:0;height:0;border-top:1.5px dashed #aaa;transform:translateY(-50%);';

      const guide = document.createElement('div');
      guide.className = 'en-guide-text';
      guide.style.cssText = `font-size:${fontSize}px;color:${hexToRgba(color, alpha/100)};font-family:${font};`;
      guide.textContent = line;

      wrap.append(top, bot, mid, guide);
      row.appendChild(wrap);
      frag.appendChild(row);
    });
    return frag;
  }

  function buildKorean(lines, color, alpha, cH, cW, font) {
    const frag = document.createDocumentFragment();
    const fontSize = Math.round(Math.min(cH, cW) * 0.72);
    const cellsPerRow = Math.max(1, Math.floor((794 - 120) / cW));

    lines.forEach(line => {
      const row = document.createElement('div');
      row.className = 'ko-row';
      const chars = [...line];
      for (let i = 0; i < cellsPerRow; i++) {
        const ch = chars[i] ?? '';
        const cell = document.createElement('div');
        cell.className = 'ko-cell';
        cell.style.cssText = `width:${cW}px;height:${cH}px;`;
        if (ch && ch !== ' ') {
          const span = document.createElement('span');
          span.className = 'ko-char';
          span.style.cssText = `font-size:${fontSize}px;color:${hexToRgba(color, alpha/100)};font-family:${font};`;
          span.textContent = ch;
          cell.appendChild(span);
        }
        row.appendChild(cell);
      }
      frag.appendChild(row);
    });
    return frag;
  }

  function chunkLine(line, max) {
    const out = [];
    for (let i = 0; i < line.length; i += max) out.push(line.slice(i, i + max));
    return out.length ? out : [''];
  }

  function render() {
    const locale   = localeEl.value;
    const rawText  = textEl.value;
    const color    = colorEl.value;
    const alpha    = parseInt(alphaEl.value);
    const lineH    = parseInt(cellH.value) || 56;
    const cellWVal = parseInt(cellW.value) || 56;
    const repeat   = parseInt(repeatRows.value) || 1;
    const font     = fontSelect.value || fontFamily(userFonts[locale][0] || 'sans-serif', locale);

    widthField.style.display = locale === 'ko' ? 'block' : 'none';
    container.innerHTML = '';

    const paperW    = 794 - 120;
    const charW     = Math.round(lineH * 0.38);
    const maxCharsEn = Math.max(1, Math.floor(paperW / charW));
    const maxCharsKo = Math.max(1, Math.floor(paperW / cellWVal));

    let expanded = [];
    rawText.split('\n').forEach(line => {
      if (!line.trim()) { expanded.push(''); return; }
      const max = locale === 'ko' ? maxCharsKo : maxCharsEn;
      chunkLine(line, max).forEach(chunk => {
        for (let r = 0; r < repeat; r++) expanded.push(chunk);
      });
    });

    const PAGE_H     = 1123 - 48 - 40 - 28;
    const rowH       = locale === 'ko' ? lineH + 4 : lineH + 8;
    const perPage    = Math.max(1, Math.floor(PAGE_H / rowH));
    while (expanded.length < perPage) expanded.push('');

    const pages = [];
    for (let i = 0; i < expanded.length; i += perPage) pages.push(expanded.slice(i, i + perPage));
    const last = pages[pages.length - 1];
    while (last.length < perPage) last.push('');

    pages.forEach((lines, idx) => {
      const page = document.createElement('div');
      page.className = 'paper-page';

      const content = document.createElement('div');
      content.className = 'paper-content';
      content.appendChild(
        locale === 'ko'
          ? buildKorean(lines, color, alpha, lineH, cellWVal, font)
          : buildEnglish(lines, color, alpha, lineH, font)
      );

      const num = document.createElement('div');
      num.className = 'page-number';
      num.textContent = pages.length > 1 ? `— ${idx + 1} / ${pages.length} —` : '';

      page.append(content, num);
      container.appendChild(page);
    });
  }

  // ── Font Manager ─────────────────────────────────────────────────────────
  const overlay      = $('font-modal-overlay');
  const fmSearch     = $('fm-search');
  const fmResults    = $('fm-results');
  const fmList       = $('fm-list');
  const fmPreviewTxt = $('fm-preview-text');
  const fmEmptyHint  = $('fm-empty-hint');

  let fmLocale = localeEl.value;    // which locale the modal is editing
  let searchDebounce = null;

  function openModal() {
    fmLocale = localeEl.value;
    syncModalTabs();
    updatePreviewPlaceholder();
    renderFmList();
    renderFmResults('');
    overlay.classList.add('open');
    fmSearch.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    populateFontSelect();
    render();
  }

  function syncModalTabs() {
    document.querySelectorAll('.fm-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.locale === fmLocale);
    });
  }

  function updatePreviewPlaceholder() {
    fmPreviewTxt.value = fmLocale === 'ko' ? '안녕하세요 반갑습니다' : 'The quick brown fox';
  }

  // Render search results
  function renderFmResults(query) {
    fmResults.innerHTML = '';
    const q = query.trim().toLowerCase();
    const catalog = GF_CATALOG[fmLocale] || [];
    const filtered = q ? catalog.filter(n => n.toLowerCase().includes(q)) : catalog;

    if (!filtered.length) {
      fmResults.innerHTML = `<div class="fm-no-results">No fonts match "${query}"</div>`;
      return;
    }

    const userList = userFonts[fmLocale];
    const previewTxt = fmPreviewTxt.value || (fmLocale === 'ko' ? '가나다라' : 'Aa Bb Cc');

    filtered.slice(0, 40).forEach(name => {
      loadGoogleFont(name);
      const already = userList.includes(name);

      const item = document.createElement('div');
      item.className = 'fm-result-item';

      const info = document.createElement('div');
      info.className = 'fm-result-info';

      const nameEl = document.createElement('div');
      nameEl.className = 'fm-result-name';
      nameEl.textContent = name;

      const preview = document.createElement('div');
      preview.className = 'fm-result-preview';
      preview.style.fontFamily = fontFamily(name, fmLocale);
      preview.textContent = previewTxt;

      info.append(nameEl, preview);

      const btn = document.createElement('button');
      btn.className = 'fm-add-btn' + (already ? ' added' : '');
      btn.textContent = already ? '✓ Added' : '+ Add';
      btn.disabled = already;
      btn.onclick = () => {
        if (userFonts[fmLocale].includes(name)) return;
        loadGoogleFont(name);
        userFonts[fmLocale].push(name);
        saveUserFonts(fmLocale, userFonts[fmLocale]);
        btn.className = 'fm-add-btn added';
        btn.textContent = '✓ Added';
        btn.disabled = true;
        renderFmList();
      };

      item.append(info, btn);
      fmResults.appendChild(item);
    });

    if (filtered.length > 40) {
      const more = document.createElement('div');
      more.className = 'fm-no-results';
      more.textContent = `${filtered.length - 40} more — refine your search`;
      fmResults.appendChild(more);
    }
  }

  // Render current font list (right side)
  function renderFmList() {
    fmList.innerHTML = '';
    const list = userFonts[fmLocale];
    const previewTxt = fmPreviewTxt.value || (fmLocale === 'ko' ? '가나다라' : 'Aa Bb Cc');

    fmEmptyHint.style.display = list.length ? 'none' : 'block';

    list.forEach((name, idx) => {
      const item = document.createElement('div');
      item.className = 'fm-list-item';

      // Up/down buttons
      const btns = document.createElement('div');
      btns.className = 'fm-order-btns';

      const up = document.createElement('button');
      up.className = 'fm-order-btn';
      up.textContent = '▲';
      up.disabled = idx === 0;
      up.onclick = () => {
        [list[idx-1], list[idx]] = [list[idx], list[idx-1]];
        saveUserFonts(fmLocale, list);
        renderFmList();
      };

      const dn = document.createElement('button');
      dn.className = 'fm-order-btn';
      dn.textContent = '▼';
      dn.disabled = idx === list.length - 1;
      dn.onclick = () => {
        [list[idx], list[idx+1]] = [list[idx+1], list[idx]];
        saveUserFonts(fmLocale, list);
        renderFmList();
      };

      btns.append(up, dn);

      // Font info
      const info = document.createElement('div');
      info.className = 'fm-list-info';

      const nameEl = document.createElement('div');
      nameEl.className = 'fm-list-name';
      nameEl.textContent = name;

      const preview = document.createElement('div');
      preview.className = 'fm-list-preview';
      preview.style.fontFamily = fontFamily(name, fmLocale);
      preview.textContent = previewTxt;

      info.append(nameEl, preview);

      // Remove button
      const rm = document.createElement('button');
      rm.className = 'fm-remove-btn';
      rm.title = 'Remove';
      rm.textContent = '×';
      rm.onclick = () => {
        userFonts[fmLocale].splice(idx, 1);
        saveUserFonts(fmLocale, userFonts[fmLocale]);
        renderFmList();
        renderFmResults(fmSearch.value); // refresh Added state
      };

      item.append(btns, info, rm);
      fmList.appendChild(item);
    });
  }

  // ── Event wiring ──────────────────────────────────────────────────────────
  $('btn-manage-fonts').onclick = openModal;
  $('fm-close').onclick = closeModal;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  document.querySelectorAll('.fm-tab').forEach(tab => {
    tab.onclick = () => {
      fmLocale = tab.dataset.locale;
      syncModalTabs();
      updatePreviewPlaceholder();
      renderFmList();
      renderFmResults(fmSearch.value);
    };
  });

  fmSearch.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => renderFmResults(fmSearch.value), 180);
  });

  $('fm-search-clear').onclick = () => {
    fmSearch.value = '';
    renderFmResults('');
    fmSearch.focus();
  };

  fmPreviewTxt.addEventListener('input', () => {
    // Update all preview texts live
    document.querySelectorAll('.fm-result-preview, .fm-list-preview').forEach(el => {
      el.textContent = fmPreviewTxt.value;
    });
  });

  localeEl.addEventListener('input', () => { populateFontSelect(); render(); });
  [textEl, colorEl, cellH, cellW, repeatRows, fontSelect].forEach(el => {
    el.addEventListener('input', render);
  });
  alphaEl.addEventListener('input', () => {
    alphaVal.textContent = alphaEl.value + '%';
    render();
  });

  $('btn-print').onclick = () => window.print();

  // ── Init ─────────────────────────────────────────────────────────────────
  populateFontSelect();
  render();
</script>
</body>
</html>
